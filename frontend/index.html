<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>8</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Stage ─────────────────────────────────────────────────────────── */
    #stage {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Ball shell ─────────────────────────────────────────────────────── */
    .ball {
      --sz: min(80vmin, 560px);
      width:  var(--sz);
      height: var(--sz);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      flex-shrink: 0;

      /* Atmosphere rim glow + ground shadow — outside the clip */
      box-shadow:
        0 0 0 3px  rgba(100,190,255,0.25),
        0 0 50px   rgba(70,150,255,0.18),
        0 0 100px  rgba(40,110,220,0.10),
        0 calc(var(--sz)*0.52) calc(var(--sz)*0.15) rgba(0,0,0,0.85),
        0 calc(var(--sz)*0.50) calc(var(--sz)*0.08) rgba(0,0,0,0.95);

      transform-origin: center 55%;
      transition: box-shadow 0.3s ease;
    }

    /* ── Ocean ──────────────────────────────────────────────────────────── */
    .ocean {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 60% at 38% 32%,
        #2890d0 0%,
        #1468a0 28%,
        #0a4878 55%,
        #052d58 78%,
        #021830 100%
      );
      z-index: 1;
    }

    /* ── Rotating continent SVG ─────────────────────────────────────────── */
    .continents {
      position: absolute;
      top: 0; left: 0;
      width: 200%; height: 100%;
      z-index: 2;
      animation: globe-spin 16s linear infinite;
    }
    .continents.fast { animation-duration: 1.8s; }

    @keyframes globe-spin {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Sphere lighting (lives on top of globe, under 8-circle) ────────── */
    .lighting {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 3;
      pointer-events: none;
      background:
        /* specular highlight — top-left, bright white */
        radial-gradient(
          ellipse 52% 42% at 28% 22%,
          rgba(255,255,255,0.62) 0%,
          rgba(220,240,255,0.25) 30%,
          rgba(180,220,255,0.06) 55%,
          transparent 72%
        ),
        /* secondary soft fill — opposite side */
        radial-gradient(
          ellipse 40% 35% at 72% 76%,
          rgba(30,80,180,0.20) 0%,
          transparent 60%
        ),
        /* rim darkening */
        radial-gradient(
          circle at 50% 50%,
          transparent 52%,
          rgba(0,8,24,0.50) 72%,
          rgba(0,4,16,0.82) 90%,
          rgba(0,0,8,0.95) 100%
        );
    }

    /* ── White 8-ball circle ────────────────────────────────────────────── */
    .eight-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width:  36%;
      height: 36%;
      border-radius: 50%;
      z-index: 4;

      background: radial-gradient(
        circle at 40% 35%,
        #ffffff 0%,
        #f0f0f0 60%,
        #d8d8d8 100%
      );
      box-shadow:
        0 2px 8px  rgba(0,0,0,0.55),
        0 1px 2px  rgba(0,0,0,0.40),
        inset 0 1px 0 rgba(255,255,255,0.90),
        inset 0 -2px 4px rgba(0,0,0,0.15);

      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.25s ease;
    }

    .eight {
      font-size: calc(var(--sz) * 0.115);
      font-weight: 900;
      color: #111;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      transition: opacity 0.2s ease;
    }

    /* ── Loading spinner (replaces eight-wrap while fetching) ───────────── */
    .spinner-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width:  36%;
      height: 36%;
      border-radius: 50%;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .spinner-ring {
      width: 50%;
      height: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.85);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Ball state classes ─────────────────────────────────────────────── */
    .ball.loading .eight-wrap  { opacity: 0; }
    .ball.loading .spinner-wrap { opacity: 1; }

    .ball.bounce {
      animation: ball-bounce 0.55s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
    }
    @keyframes ball-bounce {
      0%   { transform: scale(1)    translateY(0)   rotate(0deg); }
      18%  { transform: scale(0.92) translateY(4%)  rotate(-5deg); }
      40%  { transform: scale(1.05) translateY(-7%) rotate(4deg); }
      58%  { transform: scale(0.97) translateY(2%)  rotate(-2deg); }
      75%  { transform: scale(1.02) translateY(-2%) rotate(1deg); }
      88%  { transform: scale(0.99) translateY(0.5%); }
      100% { transform: scale(1)    translateY(0)   rotate(0deg); }
    }

    .ball.error-pulse {
      animation: error-glow 0.9s ease forwards;
    }
    @keyframes error-glow {
      0%   { box-shadow: 0 0 0 3px rgba(100,190,255,0.25), 0 0 50px rgba(70,150,255,0.18), 0 0 100px rgba(40,110,220,0.10), 0 calc(var(--sz)*.52) calc(var(--sz)*.15) rgba(0,0,0,.85), 0 calc(var(--sz)*.50) calc(var(--sz)*.08) rgba(0,0,0,.95); }
      35%  { box-shadow: 0 0 0 4px rgba(239,68,68,0.7),   0 0 70px rgba(220,50,50,0.45), 0 0 120px rgba(180,30,30,0.25), 0 calc(var(--sz)*.52) calc(var(--sz)*.15) rgba(0,0,0,.85), 0 calc(var(--sz)*.50) calc(var(--sz)*.08) rgba(0,0,0,.95); }
      100% { box-shadow: 0 0 0 3px rgba(100,190,255,0.25), 0 0 50px rgba(70,150,255,0.18), 0 0 100px rgba(40,110,220,0.10), 0 calc(var(--sz)*.52) calc(var(--sz)*.15) rgba(0,0,0,.85), 0 calc(var(--sz)*.50) calc(var(--sz)*.08) rgba(0,0,0,.95); }
    }

    /* ── Bottom sheet ───────────────────────────────────────────────────── */
    #sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: 70vh;
      background: rgba(6, 9, 18, 0.88);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -12px 60px rgba(0,0,0,0.75);
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }
    #sheet.open { transform: translateY(0); }

    .handle {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 12px 0 6px;
    }
    .handle-bar {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.18);
    }

    .card-list {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 4px 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-list::-webkit-scrollbar { display: none; }

    /* ── Player card ────────────────────────────────────────────────────── */
    .card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.075);
      border-radius: 13px;
      padding: 13px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: card-in 0.32s ease both;
      animation-delay: calc(var(--i,0) * 38ms);
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 0.93rem; font-weight: 600;
      color: #e8eaf2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-line {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.36);
      margin-top: 3px;
    }

    .card-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px; flex-shrink: 0;
    }

    .badge {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.07em;
      padding: 3px 10px; border-radius: 99px;
    }
    .badge.over  { background: rgba(34,197,94,0.14);  color: #4ade80; border: 1px solid rgba(34,197,94,0.28); }
    .badge.under { background: rgba(239,68,68,0.14);  color: #f87171; border: 1px solid rgba(239,68,68,0.28); }
    .badge.none  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.32); border: 1px solid rgba(255,255,255,0.10); }

    .conf { font-size: 0.72rem; color: rgba(255,255,255,0.28); }

    /* ── Backdrop ───────────────────────────────────────────────────────── */
    #backdrop {
      position: fixed; inset: 0; z-index: 19;
      display: none;
    }
    #backdrop.visible { display: block; }
  </style>
</head>
<body>

<div id="stage">
  <div class="ball" id="ball" role="button" tabindex="0" aria-label="Get predictions">

    <!-- 1. Ocean base -->
    <div class="ocean"></div>

    <!-- 2. Rotating continents (two tiles for seamless loop) -->
    <svg class="continents" id="continents"
         viewBox="0 0 200 100"
         preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Sphere-edge fade: make continents near left/right edges look like they wrap around -->
        <linearGradient id="edgeFade" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#000" stop-opacity="0.55"/>
          <stop offset="8%"   stop-color="#000" stop-opacity="0"/>

          <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
        </linearGradient>
      </defs>

      <!-- ── TILE 1 (x: 0–100) ── -->
      <g fill="#3d7d34" stroke="none" opacity="0.92">

        <!-- Greenland -->
        <path d="M30,1 C36,0 43,2 44,8 L43,15 L37,18 L30,14 L28,7 Z"/>

        <!-- Iceland -->
        <path d="M41,10 C43,8 47,9 48,12 L47,16 L43,16 Z"/>

        <!-- North America -->
        <path d="
          M 6,13
          C 10,5  20,3  27,6
          L 33,11 34,21
          C 33,27  31,33  29,40
          L 26,46
          C 22,48  19,46  18,43
          L 16,36
          C 14,28  14,22  16,18
          C 14,16  9,16   6,18
          Z
        "/>

        <!-- Gulf of Mexico indent detail -->
        <path d="M18,43 C19,46 22,48 25,47 L25,50 L20,50 L18,46 Z"/>

        <!-- Florida peninsula -->
        <path d="M26,43 L28,44 L27,48 L25,48 Z"/>

        <!-- Central America -->
        <path d="M19,50 C22,49 25,50 25,53 L23,58 L20,56 Z"/>

        <!-- South America -->
        <path d="
          M 22,58

          L 44,72  43,84  38,92
          L 31,92  25,84  21,70
          Z
        "/>

        <!-- Europe (with Iberian + Scandinavian hints) -->
        <path d="
          M 46,13
          C 50,9   57,10  62,14
          L 64,21  62,27
          L 58,31  56,29  58,25  54,27  52,25
          L 49,22  47,18
          Z
        "/>

        <!-- Scandinavia -->
        <path d="M 50,9 C 52,5 56,5 58,8 L 58,13 L 54,14 L 50,12 Z"/>

        <!-- UK outline -->
        <path d="M 43,13 C 45,11 48,12 48,15 L 47,19 L 44,18 Z"/>

        <!-- Africa -->
        <path d="
          M 46,28
          C 53,24  63,25  67,31
          L 69,45  67,60
          L 62,74  55,77
          L 49,73  44,61
          L 43,45

        "/>

        <!-- Madagascar -->
        <path d="M 68,52 C 70,49 72,50 73,54 L 72,60 L 70,60 L 68,56 Z"/>

        <!-- Arabian Peninsula -->
        <path d="M 63,29 L 70,27 L 75,34 L 71,45 L 64,44 L 62,36 Z"/>

        <!-- Asia (main mass) -->
        <path d="
          M 62,10
          C 71,5   86,4   98,8
          L 100,16 100,40
          L 96,50  85,52
          L 74,50  66,47
          L 63,42  63,35
          L 66,27  64,20
          Z
        "/>

        <!-- Indian subcontinent -->
        <path d="M 65,32 L 73,29 L 78,36 L 77,49 L 72,53 L 67,49 L 65,40 Z"/>

        <!-- Indochina peninsula -->
        <path d="M 79,40 L 85,38 L 87,44 L 85,53 L 80,51 Z"/>

        <!-- Japan (rough) -->
        <path d="M 91,19 C 94,17 97,19 98,23 L 97,28 L 93,28 Z"/>

        <!-- Sri Lanka -->
        <path d="M 76,54 L 78,53 L 79,56 L 77,58 Z"/>

        <!-- Australia -->
        <path d="
          M 78,60
          C 85,55  93,56  97,62
          L 99,72  97,80
          L 88,84  79,79
          L 75,70  76,62
          Z
        "/>

        <!-- Tasmania -->
        <path d="M 87,86 L 90,85 L 91,89 L 88,90 Z"/>

        <!-- New Zealand (north island hint) -->
        <path d="M 99,72 C 100,70 100,74 99,76 L 98,75 Z"/>

      </g>

      <!-- ── TILE 2 (x: 100–200, exact copies shifted +100) ── -->
      <g fill="#3d7d34" stroke="none" opacity="0.92" transform="translate(100,0)">

        <path d="M30,1 C36,0 43,2 44,8 L43,15 L37,18 L30,14 L28,7 Z"/>
        <path d="M41,10 C43,8 47,9 48,12 L47,16 L43,16 Z"/>
        <path d="M 6,13 C 10,5 20,3 27,6 L 33,11 34,21 C 33,27 31,33 29,40 L 26,46 C 22,48 19,46 18,43 L 16,36 C 14,28 14,22 16,18 C 14,16 9,16 6,18 Z"/>
        <path d="M18,43 C19,46 22,48 25,47 L25,50 L20,50 L18,46 Z"/>
        <path d="M26,43 L28,44 L27,48 L25,48 Z"/>
        <path d="M19,50 C22,49 25,50 25,53 L23,58 L20,56 Z"/>
        <path d="M 22,58 C 27,55 36,55 41,60 L 44,72 43,84 38,92 L 31,92 25,84 21,70 Z"/>
        <path d="M 46,13 C 50,9 57,10 62,14 L 64,21 62,27 L 58,31 56,29 58,25 54,27 52,25 L 49,22 47,18 Z"/>
        <path d="M 50,9 C 52,5 56,5 58,8 L 58,13 L 54,14 L 50,12 Z"/>
        <path d="M 43,13 C 45,11 48,12 48,15 L 47,19 L 44,18 Z"/>
        <path d="M 46,28 C 53,24 63,25 67,31 L 69,45 67,60 L 62,74 55,77 L 49,73 44,61 L 43,45 Z"/>
        <path d="M 68,52 C 70,49 72,50 73,54 L 72,60 L 70,60 L 68,56 Z"/>
        <path d="M 63,29 L 70,27 L 75,34 L 71,45 L 64,44 L 62,36 Z"/>
        <path d="M 62,10 C 71,5 86,4 98,8 L 100,16 100,40 L 96,50 85,52 L 74,50 66,47 L 63,42 63,35 L 66,27 64,20 Z"/>
        <path d="M 65,32 L 73,29 L 78,36 L 77,49 L 72,53 L 67,49 L 65,40 Z"/>
        <path d="M 79,40 L 85,38 L 87,44 L 85,53 L 80,51 Z"/>
        <path d="M 91,19 C 94,17 97,19 98,23 L 97,28 L 93,28 Z"/>
        <path d="M 76,54 L 78,53 L 79,56 L 77,58 Z"/>
        <path d="M 78,60 C 85,55 93,56 97,62 L 99,72 97,80 L 88,84 79,79 L 75,70 76,62 Z"/>
        <path d="M 87,86 L 90,85 L 91,89 L 88,90 Z"/>
        <path d="M 99,72 C 100,70 100,74 99,76 L 98,75 Z"/>

      </g>

      <!-- Edge-wrap fade overlay (makes globe feel round, not flat) -->
      <rect x="0" y="0" width="200" height="100" fill="url(#edgeFade)"/>

    </svg>

    <!-- 3. Lighting — specular + rim -->
    <div class="lighting"></div>

    <!-- 4. White circle + 8 -->
    <div class="eight-wrap" id="eightWrap">
      <span class="eight">8</span>
    </div>

    <!-- 5. Loading spinner -->
    <div class="spinner-wrap" id="spinnerWrap">
      <div class="spinner-ring"></div>
    </div>

  </div>
</div>

<div id="backdrop"></div>

<div id="sheet" role="dialog" aria-label="Predictions">
  <div class="handle"><div class="handle-bar"></div></div>
  <div class="card-list" id="cardList"></div>
</div>

<script>
(function () {
  'use strict';

  const COOLDOWN_MS  = 4000;
  const SHAKE_THRESH = 20;

  const ball       = document.getElementById('ball');
  const continents = document.getElementById('continents');
  const sheet      = document.getElementById('sheet');
  const backdrop   = document.getElementById('backdrop');
  const cardList   = document.getElementById('cardList');

  let loading    = false;
  let cooldownAt = 0;

  // ── Shake ──────────────────────────────────────────────────────────────
  let lastAcc = { x: 0, y: 0, z: 0 };
  function onMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const d = Math.abs((a.x||0) - lastAcc.x) + Math.abs((a.y||0) - lastAcc.y) + Math.abs((a.z||0) - lastAcc.z);
    lastAcc = { x: a.x||0, y: a.y||0, z: a.z||0 };
    if (d > SHAKE_THRESH) trigger();
  }

  let motionBound = false;
  function bindMotion() {
    if (motionBound) return;
    motionBound = true;
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(s => { if (s === 'granted') window.addEventListener('devicemotion', onMotion); })
        .catch(() => {});
    } else if (typeof DeviceMotionEvent !== 'undefined') {
      window.addEventListener('devicemotion', onMotion);
    }
  }

  // ── Input ──────────────────────────────────────────────────────────────
  ball.addEventListener('click',   () => { bindMotion(); trigger(); });
  ball.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); } });
  backdrop.addEventListener('click', closeSheet);

  let touchStartY = 0;
  sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - touchStartY > 60) closeSheet(); }, { passive: true });

  function closeSheet() {
    sheet.classList.remove('open');
    backdrop.classList.remove('visible');
  }

  // ── Trigger ────────────────────────────────────────────────────────────
  function trigger() {
    if (loading || Date.now() < cooldownAt) return;
    fetchPredictions();
  }

  // ── Fetch ──────────────────────────────────────────────────────────────
  async function fetchPredictions() {
    loading = true;
    closeSheet();

    // Bounce ball + speed up globe
    ball.classList.remove('bounce', 'error-pulse');
    void ball.offsetWidth;
    ball.classList.add('bounce');
    continents.classList.add('fast');
    setTimeout(() => continents.classList.remove('fast'), 1400);

    // Switch to loading state after bounce settles
    setTimeout(() => ball.classList.add('loading'), 320);

    try {
      const res = await fetch('/predict', {
        headers: { 'Accept': 'application/json' },
        signal: AbortSignal.timeout(15000),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderCards(data.players || []);
      openSheet();
    } catch (_) {
      ball.classList.remove('loading');
      void ball.offsetWidth;
      ball.classList.add('error-pulse');
      ball.addEventListener('animationend', () => ball.classList.remove('error-pulse'), { once: true });
    } finally {
      loading    = false;
      cooldownAt = Date.now() + COOLDOWN_MS;
      ball.classList.remove('loading');
      ball.classList.remove('bounce');
    }
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function renderCards(players) {
    if (!players.length) {
      cardList.innerHTML = '<p style="color:rgba(255,255,255,.3);font-size:.85rem;text-align:center;padding:20px 0">No data available</p>';
      return;
    }
    cardList.innerHTML = players.map((p, i) => {
      const rec  = p.recommendation;
      const cls  = rec === 'OVER' ? 'over' : rec === 'UNDER' ? 'under' : 'none';
      const line = p.prop_line != null ? `${p.prop_line} pts` : '–';
      const conf = p.confidence != null ? `${Math.round(p.confidence * 100)}%` : '';
      return `<div class="card" style="--i:${i}">
        <div class="card-info">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-line">${esc(line)}</div>
        </div>
        <div class="card-right">
          <span class="badge ${cls}">${esc(rec || '–')}</span>
          ${conf ? `<span class="conf">${conf}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function openSheet() {
    sheet.classList.add('open');
    backdrop.classList.add('visible');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
}());
</script>
</body>
</html>
