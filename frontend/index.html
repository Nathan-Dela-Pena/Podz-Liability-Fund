<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>Podz Liability Fund</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h:   56px;
      --ball-sz: min(70vmin, 520px);
      --ball-crop: 0.40; /* fraction hidden below viewport */
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Space background ──────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  #0c1f4a 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 15% 90%,  #080e28 0%, transparent 50%),
        radial-gradient(ellipse 60% 35% at 85% 85%,  #060c22 0%, transparent 50%),
        linear-gradient(180deg, #050a18 0%, #03060f 50%, #000 100%);
      pointer-events: none;
    }

    /* ── Scene (full-screen flex column) ──────────────────────────────── */
    .scene {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; overflow: hidden;
    }

    /* ── Hero text ─────────────────────────────────────────────────────── */
    .hero {
      flex-shrink: 0;
      text-align: center;
      padding: clamp(32px, 6vh, 72px) 24px clamp(20px, 3vh, 36px);
      pointer-events: none;
    }
    .eyebrow {
      font-size: clamp(0.60rem, 1.4vw, 0.72rem);
      font-weight: 700; letter-spacing: 0.30em; text-transform: uppercase;
      color: rgba(110,155,255,0.70);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      font-weight: 800; letter-spacing: -0.025em; line-height: 1.02;
      background: linear-gradient(175deg, #ffffff 0%, rgba(190,210,255,0.82) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: clamp(20px, 3vh, 32px);
    }

    /* ── CTA button ────────────────────────────────────────────────────── */
    .cta-wrap { pointer-events: auto; }

    #ctaBtn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 36px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.88);
      font-size: 0.86rem; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: background 0.2s, border-color 0.2s, transform 0.12s, opacity 0.2s;
      min-width: 160px; justify-content: center;
    }
    #ctaBtn:hover:not(:disabled) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.28);
    }
    #ctaBtn:active:not(:disabled) { transform: scale(0.97); }
    #ctaBtn:disabled { opacity: 0.45; cursor: not-allowed; }
    #ctaBtn .cd { color: rgba(120,165,255,0.95); font-variant-numeric: tabular-nums; }

    /* ── Cards zone ────────────────────────────────────────────────────── */
    .cards-zone {
      flex: 1; width: 100%; max-width: 900px;
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; align-content: flex-start;
      padding: clamp(16px,3vh,28px) clamp(16px,4vw,32px)
               /* bottom pad = visible ball height so cards don't hide behind it */
               calc(var(--ball-sz) * (1 - var(--ball-crop)) + 24px);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .cards-zone::-webkit-scrollbar { display: none; }

    /* ── Player card ───────────────────────────────────────────────────── */
    .card-outer {
      flex: 0 0 auto;
      animation: card-rise 0.45s cubic-bezier(0.22,1,0.36,1) both;
      animation-delay: calc(var(--i,0) * 42ms);
    }
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(22px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .card {
      background: rgba(6,11,28,0.76);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      min-width: 185px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
      animation: card-float 5s ease-in-out infinite;
      animation-delay: calc(var(--i,0) * 380ms);
    }
    @keyframes card-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.90);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-line { font-size: 0.72rem; color: rgba(255,255,255,0.34); margin-top: 3px; }
    .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    .badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em;
      padding: 3px 9px; border-radius: 99px;
    }
    .badge.over  { background: rgba(34,197,94,0.13);  color: #4ade80; border: 1px solid rgba(34,197,94,0.28); }
    .badge.under { background: rgba(239,68,68,0.13);  color: #f87171; border: 1px solid rgba(239,68,68,0.28); }
    .badge.none  { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.32); border: 1px solid rgba(255,255,255,0.10); }
    .conf { font-size: 0.70rem; color: rgba(255,255,255,0.26); }

    /* ── Ball anchor (X-centering, out of flow) ────────────────────────── */
    .ball-anchor {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    /* ── Ball stage (Y offset + float animation) ───────────────────────── */
    .ball-stage {
      transform: translateY(calc(var(--ball-sz) * var(--ball-crop)));
      animation: ball-float 6s ease-in-out infinite;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    @keyframes ball-float {
      0%, 100% { transform: translateY(calc(var(--ball-sz) * var(--ball-crop)));      }
      50%       { transform: translateY(calc(var(--ball-sz) * var(--ball-crop) - 14px)); }
    }

    /* pulse on trigger */
    .ball-stage.pulse { animation: ball-float 6s ease-in-out infinite, ball-pulse 0.55s ease; }
    @keyframes ball-pulse {
      0%   { filter: brightness(1)   drop-shadow(0 0  0px  rgba(140,180,255,0)); }
      35%  { filter: brightness(1.3) drop-shadow(0 0 50px  rgba(120,170,255,0.55)); }
      100% { filter: brightness(1)   drop-shadow(0 0  0px  rgba(140,180,255,0)); }
    }

    /* error pulse */
    .ball-stage.err { animation: ball-float 6s ease-in-out infinite, ball-err 0.9s ease; }
    @keyframes ball-err {
      0%   { filter: brightness(1)   drop-shadow(0 0  0px rgba(239,68,68,0)); }
      30%  { filter: brightness(1.1) drop-shadow(0 0 55px rgba(239,68,68,0.65)); }
      100% { filter: brightness(1)   drop-shadow(0 0  0px rgba(239,68,68,0)); }
    }

    /* ── Sphere shell ──────────────────────────────────────────────────── */
    .ball {
      width: var(--ball-sz); height: var(--ball-sz);
      border-radius: 50%;
      overflow: hidden;
      position: relative;

      /* Deep black base — slight warm center */
      background:
        radial-gradient(circle at 42% 38%, #1f1f1f 0%, #0e0e0e 38%, #050505 66%, #000 100%);

      /* Atmospheric glow (outside the overflow clip) + ground shadow */
      box-shadow:
        0 0  50px 14px rgba(85,125,255,0.20),
        0 0  90px 30px rgba(65,100,230,0.13),
        0 0 160px 60px rgba(45, 80,200,0.08),
        0 0 260px 90px rgba(25, 55,160,0.04),
        0 calc(var(--ball-sz)*0.43) calc(var(--ball-sz)*0.10) rgba(0,0,0,0.95),
        0 calc(var(--ball-sz)*0.47) calc(var(--ball-sz)*0.18) rgba(0,0,0,0.75);
    }

    /* Primary specular — bright white ellipse, top-left */
    .sph-spec1 {
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse 52% 43% at 26% 20%,
        rgba(255,255,255,0.76) 0%,
        rgba(245,250,255,0.38) 18%,
        rgba(210,230,255,0.12) 38%,
        transparent 58%
      );
      pointer-events: none;
    }

    /* Secondary softer highlight — slightly lower, smaller */
    .sph-spec2 {
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse 36% 28% at 40% 36%,
        rgba(255,255,255,0.16) 0%,
        rgba(220,235,255,0.06) 40%,
        transparent 66%
      );
      pointer-events: none;
    }

    /* Dark rear fill — opposite corner from light */
    .sph-rear {
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse 50% 45% at 74% 76%,
        rgba(0,0,20,0.30) 0%,
        transparent 58%
      );
      pointer-events: none;
    }

    /* Rim vignette */
    .sph-rim {
      position: absolute; inset: 0;
      background: radial-gradient(
        circle at 50% 50%,
        transparent 50%,
        rgba(0,0,14,0.35) 66%,
        rgba(0,0,10,0.68) 82%,
        rgba(0,0, 6,0.92) 96%
      );
      pointer-events: none;
    }

    /* ── White 8-ball circle ───────────────────────────────────────────── */
    .eight-wrap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 33%; height: 33%;
      border-radius: 50%; z-index: 4;

      background: radial-gradient(
        ellipse 62% 52% at 36% 30%,
        #ffffff 0%, #f5f5f5 45%, #dedede 100%
      );
      box-shadow:
        0 3px 14px rgba(0,0,0,0.65),
        0 1px 4px  rgba(0,0,0,0.55),
        inset 0  1px 0   rgba(255,255,255,1),
        inset 0 -3px 8px rgba(0,0,0,0.22);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.22s ease;
    }
    .eight {
      font-size: calc(var(--ball-sz) * 0.108);
      font-weight: 900; font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
      color: #111;
      text-shadow: 0 1px 3px rgba(0,0,0,0.28);
      line-height: 1;
    }

    /* ── Loading spinner ───────────────────────────────────────────────── */
    .spinner-wrap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 33%; height: 33%;
      border-radius: 50%; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .spinner-ring {
      width: 46%; height: 46%;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.82);
      border-radius: 50%;
      animation: spin 0.72s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ball.loading .eight-wrap   { opacity: 0; }
    .ball.loading .spinner-wrap { opacity: 1; }

  </style>
</head>
<body>

<div class="scene">

  <section class="hero">
    <p class="eyebrow">Tonight's Picks</p>
    <h1>Shake to Predict</h1>
    <div class="cta-wrap">
      <button id="ctaBtn">Get Predictions</button>
    </div>
  </section>

  <div class="cards-zone" id="cardsZone"></div>

  <!-- Ball: absolutely anchored to bottom, X-centered via .ball-anchor -->
  <div class="ball-anchor">
    <div class="ball-stage" id="ballStage">
      <div class="ball" id="ball">
        <div class="sph-spec1"></div>
        <div class="sph-spec2"></div>
        <div class="sph-rear"></div>
        <div class="sph-rim"></div>
        <div class="eight-wrap">
          <span class="eight">8</span>
        </div>
        <div class="spinner-wrap">
          <div class="spinner-ring"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ── Config ─────────────────────────────────────────────────────────── */
  const API_BASE = window.location.hostname === 'localhost'
    ? ''
    : 'https://your-render-app.onrender.com';

  const COOLDOWN_MS = 4000;

  /* ── Elements ───────────────────────────────────────────────────────── */
  const ballStage = document.getElementById('ballStage');
  const ball      = document.getElementById('ball');
  const ctaBtn    = document.getElementById('ctaBtn');
  const cardsZone = document.getElementById('cardsZone');

  let loading    = false;
  let cooldownAt = 0;
  let cdTimer    = null;

  /* ── Shake detection ─────────────────────────────────────────────────── */
  let lastAcc = { x: 0, y: 0, z: 0 };
  function onMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const d = Math.abs((a.x||0)-lastAcc.x) + Math.abs((a.y||0)-lastAcc.y) + Math.abs((a.z||0)-lastAcc.z);
    lastAcc = { x: a.x||0, y: a.y||0, z: a.z||0 };
    if (d > 20) trigger();
  }
  let motionBound = false;
  function bindMotion() {
    if (motionBound) return;
    motionBound = true;
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(s => { if (s === 'granted') window.addEventListener('devicemotion', onMotion); })
        .catch(() => {});
    } else if (typeof DeviceMotionEvent !== 'undefined') {
      window.addEventListener('devicemotion', onMotion);
    }
  }

  /* ── Inputs ──────────────────────────────────────────────────────────── */
  ctaBtn.addEventListener('click',    () => { bindMotion(); trigger(); });
  ballStage.addEventListener('click', () => { bindMotion(); trigger(); });

  /* ── Trigger ─────────────────────────────────────────────────────────── */
  function trigger() {
    if (loading || Date.now() < cooldownAt) return;
    fetchPredictions();
  }

  /* ── Fetch ───────────────────────────────────────────────────────────── */
  async function fetchPredictions() {
    loading = true;
    ctaBtn.disabled = true;
    ctaBtn.textContent = '…';

    /* Ball pulse */
    ['pulse', 'err'].forEach(c => ballStage.classList.remove(c));
    void ballStage.offsetWidth;
    ballStage.classList.add('pulse');
    ballStage.addEventListener('animationend', e => {
      if (e.animationName === 'ball-pulse') ballStage.classList.remove('pulse');
    }, { once: true });

    ball.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/predict`, {
        headers: { Accept: 'application/json' },
        signal: AbortSignal.timeout(15000),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderCards(data.players || []);
    } catch (_) {
      ['pulse'].forEach(c => ballStage.classList.remove(c));
      void ballStage.offsetWidth;
      ballStage.classList.add('err');
      ballStage.addEventListener('animationend', e => {
        if (e.animationName === 'ball-err') ballStage.classList.remove('err');
      }, { once: true });
    } finally {
      loading    = false;
      cooldownAt = Date.now() + COOLDOWN_MS;
      ball.classList.remove('loading');
      startCountdown();
    }
  }

  /* ── Countdown ────────────────────────────────────────────────────────── */
  function startCountdown() {
    clearInterval(cdTimer);
    cdTimer = setInterval(() => {
      const rem = Math.ceil((cooldownAt - Date.now()) / 1000);
      if (rem <= 0) {
        clearInterval(cdTimer);
        ctaBtn.disabled = false;
        ctaBtn.textContent = 'Get Predictions';
      } else {
        ctaBtn.innerHTML = `<span class="cd">${rem}s</span>`;
      }
    }, 250);
  }

  /* ── Render cards ─────────────────────────────────────────────────────── */
  function renderCards(players) {
    if (!players.length) return;
    cardsZone.innerHTML = players.map((p, i) => {
      const rec  = p.recommendation;
      const cls  = rec === 'OVER' ? 'over' : rec === 'UNDER' ? 'under' : 'none';
      const line = p.prop_line != null ? `${p.prop_line} pts` : '–';
      const conf = p.confidence != null ? `${Math.round(p.confidence * 100)}%` : '';
      return `<div class="card-outer" style="--i:${i}">
        <div class="card" style="--i:${i}">
          <div class="card-info">
            <div class="card-name">${esc(p.name)}</div>
            <div class="card-line">${esc(line)}</div>
          </div>
          <div class="card-right">
            <span class="badge ${cls}">${esc(rec || '–')}</span>
            ${conf ? `<span class="conf">${conf}</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
}());
</script>
</body>
</html>
