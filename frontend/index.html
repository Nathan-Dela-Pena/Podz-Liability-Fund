<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>Podz Liability Fund</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ball-sz:   min(70vmin, 520px);
      --ball-crop: 0.40;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  #0c1f4a 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 15% 90%,  #080e28 0%, transparent 50%),
        radial-gradient(ellipse 60% 35% at 85% 85%,  #060c22 0%, transparent 50%),
        linear-gradient(180deg, #050a18 0%, #03060f 50%, #000 100%);
      pointer-events: none;
    }

    /* ── Scene ─────────────────────────────────────────────────────────── */
    .scene {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; overflow: hidden;
    }

    /* ── Hero text ─────────────────────────────────────────────────────── */
    .hero {
      flex-shrink: 0; text-align: center;
      padding: clamp(32px,6vh,72px) 24px clamp(20px,3vh,36px);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .hero.hidden {
      opacity: 0;
      transform: translateY(-12px);
      pointer-events: none;
    }
    .eyebrow {
      font-size: clamp(0.60rem,1.4vw,0.72rem);
      font-weight: 700; letter-spacing: 0.30em; text-transform: uppercase;
      color: rgba(110,155,255,0.70);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(2.2rem,7vw,4.4rem);
      font-weight: 800; letter-spacing: -0.025em; line-height: 1.02;
      background: linear-gradient(175deg, #ffffff 0%, rgba(190,210,255,0.82) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Ball anchor ───────────────────────────────────────────────────── */
    .ball-anchor {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    .ball-stage {
      transform: translateY(calc(var(--ball-sz) * var(--ball-crop)));
      animation: ball-float 6s ease-in-out infinite;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    @keyframes ball-float {
      0%,100% { transform: translateY(calc(var(--ball-sz) * var(--ball-crop))); }
      50%     { transform: translateY(calc(var(--ball-sz) * var(--ball-crop) - 14px)); }
    }

    .ball-stage.pulse { animation: ball-float 6s ease-in-out infinite, ball-pulse 0.55s ease; }
    @keyframes ball-pulse {
      0%   { filter: brightness(1)   drop-shadow(0 0  0px rgba(140,180,255,0)); }
      35%  { filter: brightness(1.3) drop-shadow(0 0 50px rgba(120,170,255,0.55)); }
      100% { filter: brightness(1)   drop-shadow(0 0  0px rgba(140,180,255,0)); }
    }

    .ball-stage.err { animation: ball-float 6s ease-in-out infinite, ball-err 0.9s ease; }
    @keyframes ball-err {
      0%   { filter: brightness(1)   drop-shadow(0 0  0px rgba(239,68,68,0)); }
      30%  { filter: brightness(1.1) drop-shadow(0 0 55px rgba(239,68,68,0.65)); }
      100% { filter: brightness(1)   drop-shadow(0 0  0px rgba(239,68,68,0)); }
    }

    /* ── Ball sphere ───────────────────────────────────────────────────── */
    .ball {
      width: var(--ball-sz); height: var(--ball-sz);
      border-radius: 50%; overflow: hidden; position: relative;
      background: radial-gradient(circle at 42% 38%, #1f1f1f 0%, #0e0e0e 38%, #050505 66%, #000 100%);
      box-shadow:
        0 0  50px 14px rgba(85,125,255,0.20),
        0 0  90px 30px rgba(65,100,230,0.13),
        0 0 160px 60px rgba(45,80,200,0.08),
        0 0 260px 90px rgba(25,55,160,0.04),
        0 calc(var(--ball-sz)*0.43) calc(var(--ball-sz)*0.10) rgba(0,0,0,0.95),
        0 calc(var(--ball-sz)*0.47) calc(var(--ball-sz)*0.18) rgba(0,0,0,0.75);
    }
    .sph-spec1 {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 52% 43% at 26% 20%,
        rgba(255,255,255,0.76) 0%, rgba(245,250,255,0.38) 18%,
        rgba(210,230,255,0.12) 38%, transparent 58%);
    }
    .sph-spec2 {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 36% 28% at 40% 36%,
        rgba(255,255,255,0.16) 0%, rgba(220,235,255,0.06) 40%, transparent 66%);
    }
    .sph-rear {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 50% 45% at 74% 76%,
        rgba(0,0,20,0.30) 0%, transparent 58%);
    }
    .sph-rim {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 50%,
        transparent 50%, rgba(0,0,14,0.35) 66%,
        rgba(0,0,10,0.68) 82%, rgba(0,0,6,0.92) 96%);
    }

    /* ── White circle ──────────────────────────────────────────────────── */
    .circle-wrap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 33%; height: 33%;
      border-radius: 50%; z-index: 4;
      background: radial-gradient(ellipse 62% 52% at 36% 30%,
        #ffffff 0%, #f5f5f5 45%, #dedede 100%);
      box-shadow:
        0 3px 14px rgba(0,0,0,0.65), 0 1px 4px rgba(0,0,0,0.55),
        inset 0  1px 0   rgba(255,255,255,1),
        inset 0 -3px 8px rgba(0,0,0,0.22);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* The "8" — default state */
    .eight {
      position: absolute;
      font-size: calc(var(--ball-sz) * 0.108);
      font-weight: 900; font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
      color: #111;
      text-shadow: 0 1px 3px rgba(0,0,0,0.28);
      line-height: 1;
      transition: opacity 0.3s ease;
    }

    /* Pick display — shown inside circle while cycling */
    .pick-display {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      opacity: 0;
      transition: opacity 0.35s ease;
      padding: 6%;
      text-align: center;
    }
    .pick-display.visible { opacity: 1; }

    .pick-name {
      font-size: calc(var(--ball-sz) * 0.036);
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      color: #333; line-height: 1.1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 90%;
    }
    .pick-rec {
      font-size: calc(var(--ball-sz) * 0.072);
      font-weight: 900; letter-spacing: -0.02em; line-height: 1;
      margin-top: 2%;
    }
    .pick-rec.over  { color: #16a34a; }
    .pick-rec.under { color: #dc2626; }
    .pick-rec.error { color: #888; }
    .pick-line {
      font-size: calc(var(--ball-sz) * 0.032);
      font-weight: 600; color: #666; line-height: 1.2;
      margin-top: 1%;
    }

    /* ── Spinner (replaces circle content while loading) ──────────────── */
    .spinner-wrap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 33%; height: 33%;
      border-radius: 50%; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .spinner-ring {
      width: 46%; height: 46%;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.82);
      border-radius: 50%;
      animation: spin 0.72s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ball.loading .circle-wrap  { opacity: 0; }
    .ball.loading .spinner-wrap { opacity: 1; }
  </style>
</head>
<body>

<div class="scene">
  <section class="hero" id="hero">
    <p class="eyebrow">Tonight's Picks</p>
    <h1>Shake to Predict</h1>
  </section>

  <div class="ball-anchor">
    <div class="ball-stage" id="ballStage">
      <div class="ball" id="ball">
        <div class="sph-spec1"></div>
        <div class="sph-spec2"></div>
        <div class="sph-rear"></div>
        <div class="sph-rim"></div>

        <div class="circle-wrap" id="circleWrap">
          <span class="eight" id="eight">8</span>
          <div class="pick-display" id="pickDisplay">
            <span class="pick-name"  id="pickName"></span>
            <span class="pick-rec"   id="pickRec"></span>
            <span class="pick-line"  id="pickLine"></span>
          </div>
        </div>

        <div class="spinner-wrap">
          <div class="spinner-ring"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const API_BASE = window.location.hostname === 'localhost'
    ? ''
    : 'https://your-render-app.onrender.com';

  const COOLDOWN_MS  = 4000;
  const CYCLE_MS     = 3000;

  const hero        = document.getElementById('hero');
  const ballStage   = document.getElementById('ballStage');
  const ball        = document.getElementById('ball');
  const eight       = document.getElementById('eight');
  const pickDisplay = document.getElementById('pickDisplay');
  const pickName    = document.getElementById('pickName');
  const pickRec     = document.getElementById('pickRec');
  const pickLine    = document.getElementById('pickLine');

  let loading    = false;
  let cooldownAt = 0;
  let cycleTimer = null;
  let picks      = [];
  let pickIndex  = 0;

  /* ── Shake ──────────────────────────────────────────────────────────── */
  let lastAcc = { x: 0, y: 0, z: 0 };
  function onMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const d = Math.abs((a.x||0)-lastAcc.x)+Math.abs((a.y||0)-lastAcc.y)+Math.abs((a.z||0)-lastAcc.z);
    lastAcc = { x: a.x||0, y: a.y||0, z: a.z||0 };
    if (d > 20) trigger();
  }
  let motionBound = false;
  function bindMotion() {
    if (motionBound) return;
    motionBound = true;
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(s => { if (s === 'granted') window.addEventListener('devicemotion', onMotion); })
        .catch(() => {});
    } else if (typeof DeviceMotionEvent !== 'undefined') {
      window.addEventListener('devicemotion', onMotion);
    }
  }

  ballStage.addEventListener('click', () => { bindMotion(); trigger(); });

  /* ── Trigger ────────────────────────────────────────────────────────── */
  function trigger() {
    if (loading || Date.now() < cooldownAt) return;
    fetchPredictions();
  }

  /* ── Fetch ──────────────────────────────────────────────────────────── */
  async function fetchPredictions() {
    loading = true;
    stopCycle();

    ['pulse','err'].forEach(c => ballStage.classList.remove(c));
    void ballStage.offsetWidth;
    ballStage.classList.add('pulse');
    ballStage.addEventListener('animationend', e => {
      if (e.animationName === 'ball-pulse') ballStage.classList.remove('pulse');
    }, { once: true });

    showEight();          // reset to 8 while loading
    ball.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/predict`, {
        headers: { Accept: 'application/json' },
        signal: AbortSignal.timeout(20000),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      picks = (data.players || []).filter(p => p.recommendation);
      if (picks.length) {
        hero.classList.add('hidden');
        pickIndex = 0;
        ball.classList.remove('loading');
        showPick(picks[0]);
        startCycle();
      } else {
        showError('No picks');
      }
    } catch (_) {
      showError('No picks');
      ballStage.classList.remove('pulse');
      void ballStage.offsetWidth;
      ballStage.classList.add('err');
      ballStage.addEventListener('animationend', e => {
        if (e.animationName === 'ball-err') ballStage.classList.remove('err');
      }, { once: true });
    } finally {
      loading    = false;
      cooldownAt = Date.now() + COOLDOWN_MS;
      ball.classList.remove('loading');
    }
  }

  /* ── Pick cycling ───────────────────────────────────────────────────── */
  function startCycle() {
    stopCycle();
    if (picks.length <= 1) return;
    cycleTimer = setInterval(() => {
      pickIndex = (pickIndex + 1) % picks.length;
      fadeToPick(picks[pickIndex]);
    }, CYCLE_MS);
  }

  function stopCycle() {
    clearInterval(cycleTimer);
    cycleTimer = null;
  }

  function fadeToPick(pick) {
    pickDisplay.classList.remove('visible');
    setTimeout(() => {
      populatePick(pick);
      pickDisplay.classList.add('visible');
    }, 350);
  }

  function showPick(pick) {
    eight.style.opacity = '0';
    populatePick(pick);
    pickDisplay.classList.add('visible');
  }

  function populatePick(pick) {
    const lastName = pick.name.split(' ').slice(-1)[0];
    const rec      = pick.recommendation;           // "OVER" | "UNDER"
    const line     = pick.prop_line != null ? `${pick.prop_line} pts` : '';

    pickName.textContent = lastName;
    pickRec.textContent  = rec;
    pickRec.className    = 'pick-rec ' + (rec === 'OVER' ? 'over' : rec === 'UNDER' ? 'under' : '');
    pickLine.textContent = line;
  }

  function showError(msg) {
    ball.classList.remove('loading');
    eight.style.opacity = '0';
    pickName.textContent = '';
    pickRec.textContent  = msg;
    pickRec.className    = 'pick-rec error';
    pickLine.textContent = '';
    pickDisplay.classList.add('visible');
    // Reset back to 8 after 3s
    setTimeout(showEight, 3000);
  }

  function showEight() {
    stopCycle();
    pickDisplay.classList.remove('visible');
    setTimeout(() => {
      eight.style.opacity = '1';
      hero.classList.remove('hidden');
    }, 300);
  }
}());
</script>
</body>
</html>
